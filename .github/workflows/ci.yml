name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      # Secret scan — blocks if any credential pattern is detected
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - run: npm ci
      - run: npm run build

      - run: npm ci
        working-directory: site

      # Format check
      - name: Format check
        run: npx prettier --check "src/**/*.{astro,css,ts,tsx}"
        working-directory: site

      # Type + template check
      - name: Astro check
        run: npx astro check
        working-directory: site

      # Build must pass
      - run: npm run build
        working-directory: site
