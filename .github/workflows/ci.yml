name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0

      # Secret scan — blocks if any credential pattern is detected
      - name: Secret scan
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --only-verified

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - run: npm ci
      - run: npm run build

      - run: npm ci
        working-directory: site

      # Format check
      - name: Format check
        run: npx prettier --check "src/**/*.{astro,css,ts,tsx}"
        working-directory: site

      # Type + template check
      - name: Astro check
        run: npx astro check
        working-directory: site

      # Build must pass
      - run: npm run build
        working-directory: site
        env:
          PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
